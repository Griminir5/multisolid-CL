references:
  chemistry_file: chemistry.yaml
  program_file: program.yaml
  solids_file: solids.yaml
simulation:
  system_name: oxygenbreakthrough
  time_horizon_s: 1000.0
  reporting_interval_s: 1.0
  repeat_program: true
  mass_scheme: weno3
  heat_scheme: weno3
  report_time_derivatives: false
model:
  bed_length_m: 0.4
  bed_radius_m: 0.017214
  axial_cells: 20
solver:
  relative_tolerance: 1.0e-5
outputs:
  directory: output
  artifacts_directory: output/artifacts
  requested_reports:
    - temperature
    - pressure
    - gas_mole_fraction
    - heat_balance
    - mass_balance